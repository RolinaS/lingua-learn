name: lingua-learn

services:
  # ─────────────────────────────────────────────
  # REVERSE PROXY — Nginx
  # Point d'entrée unique :
  #   http://localhost
  #   http://localhost/api
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lingua-learn-nginx
    restart: unless-stopped
    ports:
      - "80:80"                             # Seul port exposé à l'hôte
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    networks:
      - lingua-network
    depends_on:
      - frontend
      - backend

  # ─────────────────────────────────────────────
  # BASE DE DONNÉES — PostgreSQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lingua-learn-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"                              
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - lingua-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # BACKEND — Express.js + Node.js
  # Accessible via http://localhost/api
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: lingua-learn-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    expose:
      - "5000"                              # Interne uniquement
    volumes:
      - ./backend/src:/app/src              # Hot-reload
      - /app/node_modules
    networks:
      - lingua-network
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # FRONTEND — Next.js
  # Accessible via http://localhost
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: lingua-learn-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-LinguaLearn}
    expose:
      - "3000"                              # Interne uniquement
    volumes:
      - ./frontend/src:/app/src             # Hot-reload
      - ./frontend/public:/app/public
      - /app/node_modules
      - /app/.next
    networks:
      - lingua-network
    depends_on:
      - backend

# ─────────────────────────────────────────────
# VOLUMES PERSISTANTS
# ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─────────────────────────────────────────────
# RÉSEAU INTERNE
# ─────────────────────────────────────────────
networks:
  lingua-network:
    driver: bridge